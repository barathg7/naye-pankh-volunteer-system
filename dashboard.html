<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NayePankh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">NayePankh</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#" id="logoutBtn" class="active">Logout</a>
            </div>
        </div>
    </nav>

    <section class="dashboard-container">
        <div class="dashboard-header">
            <h2>Volunteer Dashboard</h2>
            <div class="dashboard-actions">
                <button id="exportBtn" class="action-button">Export Report</button>
                <button id="refreshBtn" class="action-button">Refresh</button>
            </div>
        </div>

        <div id="volunteersTable" class="table-wrapper">
            <table id="volunteersList">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Age</th>
                        <th>Skills</th>
                        <th>Availability</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="volunteerBody">
                    <!-- Volunteers will be loaded here -->
                </tbody>
            </table>
            <p id="noVolunteers" class="empty-state">No volunteers registered yet.</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 NayePankh. All rights reserved.</p>
    </footer>

    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
